<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Network Topology</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --surface2: #161e28;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --accent2: #0ea5e9;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #cdd9e5;
    --text-dim: #6b7f8f;
    --node-bg: #131c27;
    --node-border: #1e3048;
    --line: #1a3a52;
    --line-active: #00d4aa;
    --line-internet: #7c3aed;
    --theme-toggle-bg: #1e2d3d;
    --theme-toggle-icon: #cdd9e5;
  }

  /* ── Dark theme (default) ── */
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --surface2: #161e28;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --accent2: #0ea5e9;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #cdd9e5;
    --text-dim: #6b7f8f;
    --node-bg: #131c27;
    --node-border: #1e3048;
    --line: #1a3a52;
    --line-active: #00d4aa;
    --line-internet: #7c3aed;
    --theme-toggle-bg: #1e2d3d;
    --theme-toggle-icon: #cdd9e5;
  }

  /* ── Light theme — OS preference OR manual .light class ── */
  @media (prefers-color-scheme: light) {
    :root:not(.dark) {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #e8eef5;
      --border: #c8d8e8;
      --accent: #00a882;
      --accent2: #0284c7;
      --warn: #d97706;
      --danger: #dc2626;
      --text: #1a2a3a;
      --text-dim: #5a7290;
      --node-bg: #ffffff;
      --node-border: #b8cfe0;
      --line: #b0c8e0;
      --line-active: #00a882;
      --line-internet: #6d28d9;
      --theme-toggle-bg: #e2eaf2;
      --theme-toggle-icon: #1a2a3a;
    }
  }

  :root.light {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #c8d8e8;
    --accent: #00a882;
    --accent2: #0284c7;
    --warn: #d97706;
    --danger: #dc2626;
    --text: #1a2a3a;
    --text-dim: #5a7290;
    --node-bg: #ffffff;
    --node-border: #b8cfe0;
    --line: #b0c8e0;
    --line-active: #00a882;
    --line-internet: #6d28d9;
    --theme-toggle-bg: #e2eaf2;
    --theme-toggle-icon: #1a2a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* TOP BAR */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 100;
  }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-title { color: var(--text-dim); font-size: 12px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    top: 48px; left: 0; bottom: 0;
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 50;
    padding: 12px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section { padding: 8px 16px 4px; font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

  .device-row {
    padding: 8px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .device-row:hover { background: var(--surface2); }
  .device-row.active { border-left-color: var(--accent); background: rgba(0,212,170,0.05); }
  .device-name { font-weight: 500; font-size: 12px; color: var(--text); }
  .device-type { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .device-stats { display: flex; gap: 10px; margin-top: 4px; }
  .stat { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .stat span { color: var(--accent2); }
  .port-bar { display: flex; gap: 2px; margin-top: 5px; }
  .port { width: 10px; height: 5px; border-radius: 1px; background: var(--border); }
  .port.active { background: var(--accent); }
  .port.uplink { background: var(--accent2); }
  .port.warn { background: var(--warn); }

  /* THEME TOGGLE */
  .theme-toggle {
    width: 32px;
    height: 32px;
    background: var(--theme-toggle-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--theme-toggle-icon);
    font-size: 15px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Light theme node overrides */
  @media (prefers-color-scheme: light) {
    :root:not(.dark) .node { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    :root:not(.dark) .node:hover { box-shadow: 0 4px 20px rgba(0,168,130,0.18); }
    :root:not(.dark) .node.internet-node { background: #f5f0ff; border-color: #ddd0f8; }
    :root:not(.dark) .node.internet-node:hover { border-color: #6d28d9; box-shadow: 0 4px 20px rgba(109,40,217,0.15); }
    :root:not(.dark) .node.gateway { border-color: #b0cfe8; }
    :root:not(.dark) .np.used { background: #d0f0e8; }
    :root:not(.dark) .np.used::after { background: var(--accent); }
    :root:not(.dark) .np.uplink { background: #cce4f6; }
    :root:not(.dark) .np.uplink::after { background: var(--accent2); }
    :root:not(.dark) .detail-panel { box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    :root:not(.dark) .minimap { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    :root:not(.dark) .port.active { background: var(--accent); }
    :root:not(.dark) .port.uplink { background: var(--accent2); }
  }
  :root.light .node { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  :root.light .node:hover { box-shadow: 0 4px 20px rgba(0,168,130,0.18); }
  :root.light .node.internet-node { background: #f5f0ff; border-color: #ddd0f8; }
  :root.light .node.internet-node:hover { border-color: #6d28d9; box-shadow: 0 4px 20px rgba(109,40,217,0.15); }
  :root.light .node.gateway { border-color: #b0cfe8; }
  :root.light .np.used { background: #d0f0e8; }
  :root.light .np.used::after { background: var(--accent); }
  :root.light .np.uplink { background: #cce4f6; }
  :root.light .np.uplink::after { background: var(--accent2); }
  :root.light .detail-panel { box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  :root.light .minimap { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  :root.light .port.active { background: var(--accent); }
  :root.light .port.uplink { background: var(--accent2); }

  /* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
  .sidebar-toggle {
    display: none;
    width: 32px; height: 32px;
    background: var(--theme-toggle-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--theme-toggle-icon);
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* CANVAS AREA — base rule before media queries so overrides work */
  .canvas-wrap {
    position: fixed;
    top: 48px; left: 260px; right: 0; bottom: 0;
    overflow: hidden;
  }

  /* Tablet: narrow sidebar */
  @media (max-width: 900px) {
    .topbar-title { display: none; }
    .topbar-sep   { display: none; }
    .sidebar { width: 200px; }
    .canvas-wrap { left: 200px; }
    .minimap { left: 216px; }
  }

  /* Mobile: sidebar becomes a slide-over drawer */
  @media (max-width: 600px) {
    .sidebar-toggle { display: flex; }
    .sidebar {
      left: -260px;
      width: 260px;
      transition: left 0.25s ease;
      z-index: 200;
      box-shadow: none;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    }
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 190;
    }
    .sidebar-backdrop.show { display: block; }
    /* Canvas fills full width — sidebar is an overlay */
    .canvas-wrap { left: 0; }
    .detail-panel { left: 16px; right: 16px; width: auto; }
  }

  /* CANVAS AREA (duplicate removed — moved above) */

  #canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: grab;
  }
  #canvas.dragging { cursor: grabbing; }

  /* SVG LINES */
  #lines {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }

  /* NODES */
  .node {
    position: absolute;
    width: 200px;
    background: var(--node-bg);
    border: 1px solid var(--node-border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: grab;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .node:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 24px rgba(0,212,170,0.15);
    z-index: 10;
  }
  .node.dragging-node { cursor: grabbing; z-index: 20; border-color: var(--accent); box-shadow: 0 8px 32px rgba(0,212,170,0.25); }
  .node.gateway { border-color: #1a3a5c; }
  .node.internet-node { border-color: #2a1a5c; background: #0d0d1a; cursor: grab; }
  .node.internet-node:hover { border-color: #7c3aed; box-shadow: 0 4px 24px rgba(124,58,237,0.2); }

  .node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .node-icon { width: 24px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .node-icon.router { background: rgba(14,165,233,0.15); color: var(--accent2); }
  .node-icon.switch { background: rgba(0,212,170,0.12); color: var(--accent); }
  .node-icon.ap { background: rgba(245,158,11,0.12); color: var(--warn); }
  .node-icon.internet { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .node-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .node-badge { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); background: var(--border); padding: 1px 5px; border-radius: 3px; }

  .node-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .ns { display: flex; flex-direction: column; }
  .ns-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .ns-val { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text); margin-top: 1px; }
  .ns-val.good { color: var(--accent); }
  .ns-val.warn { color: var(--warn); }

  .node-ports { display: flex; gap: 3px; margin-top: 8px; flex-wrap: wrap; }
  .np { width: 12px; height: 7px; border-radius: 1.5px; background: var(--border); position: relative; }
  .np.used { background: #1a4a35; }
  .np.used::after { content: ''; position: absolute; inset: 1.5px; border-radius: 0.5px; background: var(--accent); opacity: 0.7; }
  .np.uplink { background: #1a304a; }
  .np.uplink::after { content: ''; position: absolute; inset: 1.5px; border-radius: 0.5px; background: var(--accent2); opacity: 0.8; }

  .node-conn-count {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    display: flex; gap: 8px;
  }
  .conn-item { display: flex; align-items: center; gap: 3px; }
  .conn-dot { width: 5px; height: 5px; border-radius: 50%; }

  .internet-status { font-size: 10px; color: #a78bfa; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

  /* CONTROLS */
  .controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 16px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* DETAIL PANEL */
  .detail-panel {
    position: fixed;
    top: 64px; right: 16px;
    width: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    z-index: 60;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .detail-panel.show { display: block; }
  .dp-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .dp-type { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
  .dp-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .dp-row:last-child { border-bottom: none; }
  .dp-key { font-size: 11px; color: var(--text-dim); }
  .dp-val { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .dp-close { position: absolute; top: 10px; right: 10px; cursor: pointer; color: var(--text-dim); font-size: 14px; }
  .dp-close:hover { color: var(--text); }

  /* MINIMAP */
  .minimap {
    position: fixed;
    bottom: 24px;
    left: 276px;
    width: 140px;
    height: 90px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    z-index: 49;
    opacity: 0.8;
  }

  @media (max-width: 600px) {
    /* Hide zoom controls — pinch to zoom works instead */
    .controls { display: none; }
    /* Hide minimap — not useful on small screens */
    .minimap { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</div>
  <div class="topbar-logo">◈ UNIFI NETMAP</div>
  <div class="topbar-sep"></div>
  <div class="topbar-title">Network Topology by James Wilson</div>
  <div class="topbar-right">
    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</div>
    <div class="status-dot" id="statusDot"></div>
    <div class="status-label" id="statusLabel">CONNECTING...</div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-section">Devices</div>
</div>

<!-- SIDEBAR BACKDROP (mobile) -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

<!-- CANVAS -->
<div class="canvas-wrap" id="canvasWrap">
  <div id="canvas">
    <svg id="lines" width="4000" height="4000"></svg>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="dp-close" onclick="closeDetail()">✕</div>
  <div class="dp-title" id="dp-name"></div>
  <div class="dp-type" id="dp-type"></div>
  <div id="dp-rows"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="ctrl-btn" onclick="zoom(1.15)" title="Zoom in">+</div>
  <div class="ctrl-btn" onclick="zoom(0.87)" title="Zoom out">−</div>
  <div class="ctrl-btn" onclick="resetView()" title="Reset view" style="font-size:12px">⌂</div>
</div>

<!-- MINIMAP -->
<div class="minimap" id="minimap">
  <canvas id="minimapCanvas" width="140" height="90"></canvas>
</div>

<script>
// ─── INGRESS BASE PATH ───────────────────────────────────────────────────────
// When running as a HA add-on the page is served under a dynamic ingress path
// like /api/hassio_ingress/<token>/. We derive BASE from window.location so
// all fetch calls are correctly prefixed — no server round-trip needed.
let BASE = '';
async function resolveBase() {
  // HA Ingress serves the page at:
  //   /api/hassio_ingress/<token>/        (with trailing slash)
  //   /api/hassio_ingress/<token>         (without trailing slash, rare)
  //   /api/hassio_ingress/<token>/index.html  (direct file request)
  //
  // In all cases BASE must be /api/hassio_ingress/<token> with no trailing slash.
  // Strategy: make a HEAD request to /unifi/proxy/network/integration/v1/sites
  // using progressively shorter path prefixes until we get a non-404, OR
  // derive it from the X-Ingress-Path the server echoes back in a ping endpoint.
  //
  // Simpler reliable approach: the server always responds to /unifi/* regardless
  // of the ingress prefix because the Python handler strips it.  So we probe
  // window.location.pathname from longest to shortest prefix.
  const pathname = window.location.pathname;

  // Build candidate bases from the pathname, longest first:
  //   /api/hassio_ingress/TOKEN/index.html -> /api/hassio_ingress/TOKEN
  //   /api/hassio_ingress/TOKEN/           -> /api/hassio_ingress/TOKEN
  //   /api/hassio_ingress/TOKEN            -> /api/hassio_ingress/TOKEN
  const parts = pathname.replace(/\/+$/, '').split('/');
  // Remove trailing filename if present (contains a dot)
  if (parts[parts.length - 1].includes('.')) parts.pop();
  BASE = parts.join('/');
  console.log('Ingress BASE:', BASE);
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let devices = [];
let scale = 0.8;
let panX = 40, panY = 20;
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let dragNode = null, dragOffX = 0, dragOffY = 0;

// Internet node — virtual top-level node
const internetNode = {
  id: 'internet',
  name: 'Internet',
  type: 'internet',
  model: 'WAN',
  ip: '—',
  x: 600, y: 0
};

// Node approximate height for connector math
const NODE_W = 200;
const NODE_H = 65;

// ─── ICONS ───────────────────────────────────────────────────────────────────
const icons = {
  router:   '⬡',
  switch:   '⬢',
  ap:       '◎',
  internet: '⊕'
};

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderNodes();
  renderLines();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-section">Devices</div>';
  devices.forEach(d => {
    const row = document.createElement('div');
    row.className = 'device-row';
    row.dataset.id = d.id;
    const ports = Array.from({length: Math.min(d.ports, 16)}, (_, i) => {
      const cls = i === 0 ? 'port uplink' : (i < d.portsUsed ? 'port active' : 'port');
      return `<div class="${cls}"></div>`;
    }).join('');
    row.innerHTML = `
      <div class="device-name">${d.name}</div>
      <div class="device-type">${d.model}</div>
      <div class="port-bar">${ports}</div>
      <div class="device-stats">
        <span class="stat">CPU <span>${d.cpu.toFixed(1)}%</span></span>
        <span class="stat">MEM <span>${d.mem.toFixed(1)}%</span></span>
      </div>
    `;
    row.onclick = () => { focusNode(d.id); showDetail(d); };
    sb.appendChild(row);
  });
}

function renderNodes() {
  document.querySelectorAll('.node').forEach(n => n.remove());
  const canvas = document.getElementById('canvas');

  // ── Internet node ──
  const inetEl = document.createElement('div');
  inetEl.className = 'node internet-node';
  inetEl.dataset.id = 'internet';
  inetEl.style.left = internetNode.x + 'px';
  inetEl.style.top  = internetNode.y + 'px';
  inetEl.innerHTML = `
    <div class="node-header">
      <div class="node-icon internet">${icons.internet}</div>
      <div class="node-name">Internet</div>
      <div class="node-badge">WAN</div>
    </div>
    <div class="internet-status">▲ WAN Uplink</div>
  `;
  inetEl.addEventListener('mousedown', nodeMouseDown);
  canvas.appendChild(inetEl);

  // ── Device nodes ──
  devices.forEach(d => {
    const el = document.createElement('div');
    el.className = `node ${d.type === 'router' ? 'gateway' : ''}`;
    el.dataset.id = d.id;
    el.style.left = d.x + 'px';
    el.style.top  = d.y + 'px';

    const cpuColor = d.cpu > 80 ? 'warn' : 'good';
    const memColor = d.mem > 85 ? 'warn' : 'good';

    const portHTML = Array.from({length: Math.min(d.ports, 16)}, (_, i) => {
      const cls = i === 0 ? 'np uplink' : (i < d.portsUsed ? 'np used' : 'np');
      return `<div class="${cls}" title="Port ${i+1}"></div>`;
    }).join('');

    el.innerHTML = `
      <div class="node-header">
        <div class="node-icon ${d.type}">${icons[d.type] || '◈'}</div>
        <div class="node-name">${d.name}</div>
        <div class="node-badge">${d.model}</div>
      </div>
      <div class="node-stats">
        <div class="ns"><div class="ns-label">CPU</div><div class="ns-val ${cpuColor}">${d.cpu.toFixed(1)}%</div></div>
        <div class="ns"><div class="ns-label">MEM</div><div class="ns-val ${memColor}">${d.mem.toFixed(1)}%</div></div>
        ${d.clients > 0 ? `<div class="ns"><div class="ns-label">Clients</div><div class="ns-val">${d.clients}</div></div>` : ''}
        ${`<div class="ns"><div class="ns-label">IP Address</div><div class="ns-val">${d.ip}</div></div>`}
      </div>
      <div class="node-ports">${portHTML}</div>
      <div class="node-conn-count">
        <span class="conn-item"><span class="conn-dot" style="background:var(--accent)"></span>${d.portsUsed} ports</span>
        ${d.stp ? '<span class="conn-item"><span style="color:var(--warn);font-size:9px">★ STP Root</span></span>' : ''}
      </div>
    `;

    el.addEventListener('mousedown', nodeMouseDown);
    el.addEventListener('click', (e) => { e.stopPropagation(); showDetail(d); highlightSidebar(d.id); });
    canvas.appendChild(el);
  });

  applyTransform();
}

function renderLines() {
  const svg = document.getElementById('lines');
  svg.innerHTML = '';

  // Draw line from each device to its uplink (or to internet node if router)
  devices.forEach(d => {
    let src;
    if (d.uplink) {
      src = devices.find(x => x.id === d.uplink);
    } else if (d.type === 'router') {
      src = internetNode;
    }
    if (!src) return;

    // Bottom-center of parent → top-center of child
    const x1 = src.x + NODE_W / 2;
    const y1 = src.y + NODE_H;
    const x2 = d.x + NODE_W / 2;
    const y2 = d.y;

    const cy = (y1 + y2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cy}, ${x2} ${cy}, ${x2} ${y2}`);
    if (d.type === 'router') {
      path.setAttribute('stroke', 'var(--line-internet)');
      path.setAttribute('stroke-width', '3.5');
    } else {
      path.setAttribute('stroke', 'var(--line-active)');
      path.setAttribute('stroke-width', '1.5');
    }
    
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.5');

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x2);
    circle.setAttribute('cy', y2);
    circle.setAttribute('r', '3');
    circle.setAttribute('fill', 'var(--accent)');
    circle.setAttribute('opacity', '0.7');

    svg.appendChild(path);
    svg.appendChild(circle);

    if (d.uplinkPort) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', (x1 + x2) / 2 + 5);
      text.setAttribute('y', (y1 + y2) / 2);
      text.setAttribute('fill', 'var(--accent2)');
      text.setAttribute('font-size', '9');
      text.setAttribute('font-family', 'JetBrains Mono, monospace');
      text.setAttribute('opacity', '0.7');
      text.textContent = `p${d.uplinkPort}`;
      svg.appendChild(text);
    }
  });
}

// ─── LAYOUT ──────────────────────────────────────────────────────────────────
function layoutDevices(devs) {
  const NODE_W = 200;
  const H_GAP  = 120;   // horizontal gap between siblings
  const V_GAP  = 180;  // vertical gap between rows

  // Find the router (depth 0, no uplink resolved to another device)
  const router = devs.find(d => d.type === 'router');

  // Build children map: id → [child, child, ...]
  const childrenOf = {};
  devs.forEach(d => {
    const pid = d.uplink || (d.type === 'router' ? 'internet' : null);
    if (!childrenOf[pid]) childrenOf[pid] = [];
    childrenOf[pid].push(d);
  });

  // Recursively calculate the subtree width needed for a node
  function subtreeWidth(d) {
    const children = childrenOf[d.id] || [];
    if (children.length === 0) return NODE_W;
    const childrenTotal = children.reduce((sum, c) => sum + subtreeWidth(c), 0);
    const gaps = (children.length - 1) * H_GAP;
    return Math.max(NODE_W, childrenTotal + gaps);
  }

  // Recursively assign x/y positions
  function assignPositions(d, centerX, depth) {
    d.x = centerX - NODE_W / 2;
    d.y = 40 + (depth + 1) * (NODE_W * 0.45 + V_GAP); // +1 to leave room for internet node

    const children = childrenOf[d.id] || [];
    if (children.length === 0) return;

    const totalW = children.reduce((sum, c) => sum + subtreeWidth(c), 0)
                   + (children.length - 1) * H_GAP;
    let curX = centerX - totalW / 2;

    children.forEach(c => {
      const cw = subtreeWidth(c);
      assignPositions(c, curX + cw / 2, depth + 1);
      curX += cw + H_GAP;
    });
  }

  // Start layout: internet node centered on viewport, router beneath it
  const canvasCenterX = (window.innerWidth - sidebarWidth()) / 2 / 0.8;
  internetNode.x = canvasCenterX - NODE_W / 2;
  internetNode.y = 20;

  // Layout from router downward
  if (router) {
    assignPositions(router, canvasCenterX, -0.55);
  }

  // Any orphaned devices (no uplink resolved) get placed in a row at the bottom
  const placed = new Set(devs.filter(d => d.x !== 0 || d.y !== 0).map(d => d.id));
  const orphans = devs.filter(d => !placed.has(d.id));
  orphans.forEach((d, i) => {
    d.x = 100 + i * (NODE_W + H_GAP);
    d.y = 40 + 5 * V_GAP;
  });
}

// ─── TRANSFORM ───────────────────────────────────────────────────────────────
function applyTransform() {
  const canvas = document.getElementById('canvas');
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  canvas.style.transformOrigin = '0 0';
}

function zoom(factor) {
  scale = Math.max(0.3, Math.min(2.5, scale * factor));
  applyTransform();
  drawMinimap();
}

function resetView() {
  scale = 0.8; panX = 40; panY = 20;
  applyTransform();
  drawMinimap();
}

// ─── PAN ─────────────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvasWrap');
wrap.addEventListener('mousedown', (e) => {
  if (dragNode) return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panOriginX = panX;
  panOriginY = panY;
  document.getElementById('canvas').classList.add('dragging');
});
window.addEventListener('mousemove', (e) => {
  if (isPanning && !dragNode) {
    panX = panOriginX + (e.clientX - panStartX);
    panY = panOriginY + (e.clientY - panStartY);
    applyTransform();
    drawMinimap();
  }
  if (dragNode) {
    // Handle internet node drag
    if (dragNode === 'internet') {
      internetNode.x = (e.clientX - dragOffX - panX) / scale;
      internetNode.y = (e.clientY - dragOffY - panY) / scale;
      const el = document.querySelector(`.node[data-id="internet"]`);
      if (el) { el.style.left = internetNode.x + 'px'; el.style.top = internetNode.y + 'px'; }
      renderLines();
      drawMinimap();
      return;
    }
    const d = devices.find(x => x.id === dragNode);
    if (d) {
      d.x = (e.clientX - dragOffX - panX) / scale;
      d.y = (e.clientY - dragOffY - panY) / scale;
      const el = document.querySelector(`.node[data-id="${dragNode}"]`);
      if (el) { el.style.left = d.x + 'px'; el.style.top = d.y + 'px'; }
      renderLines();
      drawMinimap();
    }
  }
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  dragNode = null;
  document.getElementById('canvas').classList.remove('dragging');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('dragging-node'));
});

wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.08 : 0.93);
}, { passive: false });

// ─── NODE DRAG ────────────────────────────────────────────────────────────────
function nodeMouseDown(e) {
  e.stopPropagation();
  const id = e.currentTarget.dataset.id;
  dragNode = id;
  let nodeX, nodeY;
  if (id === 'internet') {
    nodeX = internetNode.x; nodeY = internetNode.y;
  } else {
    const d = devices.find(x => x.id === id);
    nodeX = d.x; nodeY = d.y;
  }
  dragOffX = e.clientX - (nodeX * scale + panX);
  dragOffY = e.clientY - (nodeY * scale + panY);
  e.currentTarget.classList.add('dragging-node');
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
function showDetail(d) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('dp-name').textContent = d.name;
  document.getElementById('dp-type').textContent = `${d.model} · ${d.type.toUpperCase()}`;
  const uplinkName = d.uplink
    ? (devices.find(x => x.id === d.uplink)?.name || '—')
    : (d.type === 'router' ? 'Internet' : '—');
  const rows = [
    ['IP Address',  d.ip],
    ['CPU Usage',   d.cpu > 0 ? d.cpu.toFixed(1) + '%' : '—'],
    ['Memory',      d.mem > 0 ? d.mem.toFixed(1) + '%' : '—'],
    ['Uptime',      d.uptime || '—'],
    ['Clients',     d.clients],
    ['Ports Used',  `${d.portsUsed} / ${d.ports}`],
    ['TX Rate',     d.tx || '—'],
    ['RX Rate',     d.rx || '—'],
    ['Uplink',      uplinkName],
    ['Status',      '● Online'],
  ];
  document.getElementById('dp-rows').innerHTML = rows.map(([k, v]) =>
    `<div class="dp-row"><span class="dp-key">${k}</span><span class="dp-val">${v}</span></div>`
  ).join('');

}
function closeDetail() { document.getElementById('detailPanel').classList.remove('show'); }

function highlightSidebar(id) {
  document.querySelectorAll('.device-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector(`.device-row[data-id="${id}"]`);
  if (row) row.classList.add('active');
}

function sidebarWidth() {
  return window.innerWidth <= 600 ? 0 : (window.innerWidth <= 900 ? 200 : 260);
}

function focusNode(id) {
  const d = id === 'internet' ? internetNode : devices.find(x => x.id === id);
  if (!d) return;
  panX = -d.x * scale + (window.innerWidth - sidebarWidth()) / 2 - NODE_W / 2;
  panY = -d.y * scale + (window.innerHeight - 48) / 2;
  applyTransform();
}

// ─── MINIMAP ──────────────────────────────────────────────────────────────────
function drawMinimap() {
  const c = document.getElementById('minimapCanvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 140, 90);
  ctx.fillStyle = isEffectivelyLight() ? '#f0f4f8' : '#0a0e14';
  ctx.fillRect(0, 0, 140, 90);

  const scaleX = 90 / 1200;
  const scaleY = 70 / 900;

  // Internet node line
  devices.forEach(d => {
    let src = d.uplink ? devices.find(x => x.id === d.uplink) : (d.type === 'router' ? internetNode : null);
    if (!src) return;
    ctx.beginPath();
    ctx.strokeStyle = '#00d4aa44';
    ctx.lineWidth = 0.8;
    ctx.moveTo(src.x * scaleX, src.y * scaleY);
    ctx.lineTo(d.x * scaleX, d.y * scaleY);
    ctx.stroke();
  });

  // Internet node dot
  ctx.fillStyle = '#a78bfa';
  ctx.beginPath();
  ctx.arc(internetNode.x * scaleX, internetNode.y * scaleY, 3, 0, Math.PI * 2);
  ctx.fill();

  // Device dots
  devices.forEach(d => {
    ctx.fillStyle = d.type === 'router' ? '#0ea5e9' : d.type === 'ap' ? '#f59e0b' : '#00d4aa';
    ctx.beginPath();
    ctx.arc(d.x * scaleX, d.y * scaleY, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Viewport indicator
  const vx = (-panX / scale) * scaleX;
  const vy = (-panY / scale) * scaleY;
  const vw = ((window.innerWidth - 260) / scale) * scaleX;
  const vh = ((window.innerHeight - 48) / scale) * scaleY;
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);
}

// ─── API FETCH ────────────────────────────────────────────────────────────────
// Cached after first successful fetch — sites list never changes at runtime
let _siteId = null;
let _fetchInFlight = false;

async function fetchFromAPI() {
  if (_fetchInFlight) {
    console.warn('[fetchFromAPI] blocked by in-flight guard');
    return;
  }
  _fetchInFlight = true;

  document.getElementById('statusLabel').textContent = 'CONNECTING...';
  document.getElementById('statusDot').style.background = 'var(--warn)';

  try {
    // Fetch site ID once and cache it for the session
    if (!_siteId) {
      const sitesRes = await fetch(`${BASE}/unifi/proxy/network/integration/v1/sites`, {
        headers: { Accept: 'application/json' }
      });
      if (!sitesRes.ok) throw new Error(`Sites API: ${sitesRes.status}`);
      const sitesData = await sitesRes.json();
      _siteId = sitesData.data?.[0]?.id;
      if (!_siteId) throw new Error('No site found');
    }

    // Fetch device list + full stats in parallel
    const [listRes, statsRes] = await Promise.all([
      fetch(`${BASE}/unifi/proxy/network/integration/v1/sites/${_siteId}/devices`, {
        headers: { Accept: 'application/json' }
      }),
      fetch(`${BASE}/unifi/proxy/network/api/s/default/stat/device`, {
        headers: { Accept: 'application/json' }
      })
    ]);

    if (!listRes.ok) throw new Error(`List API: ${listRes.status}`);
    if (!statsRes.ok) throw new Error(`Stats API: ${statsRes.status}`);

    parseUniFiDevices(await listRes.json(), await statsRes.json());

    document.getElementById('statusLabel').textContent = 'LIVE';
    document.getElementById('statusDot').style.background = 'var(--accent)';
    document.getElementById('statusDot').style.boxShadow = '0 0 6px var(--accent)';
  } catch (err) {
    console.error('API failed:', err);
    const msg = err.message || String(err);
    document.getElementById('statusLabel').textContent = `ERROR: ${msg}`;
    document.getElementById('statusLabel').title = msg;
    document.getElementById('statusDot').style.background = 'var(--danger)';
    document.getElementById('statusDot').style.boxShadow = 'none';
  } finally {
    _fetchInFlight = false;
  }
}

// ─── POSITION CACHE ───────────────────────────────────────────────────────────
// Persists node positions across refreshes so manual layout is preserved
const positionCache = {};  // id → { x, y }

function savePositions() {
  // Save all devices
  devices.forEach(d => {
    positionCache[d.id] = { x: d.x, y: d.y };
  });
}

function parseUniFiDevices(listData, statsData) {
  // Save current positions before we do anything else
  savePositions();

  const devList   = listData.data  || [];
  const statsList = statsData.data || [];

  const statsByMac = {};
  statsList.forEach(s => { if (s.mac) statsByMac[s.mac.toLowerCase()] = s; });

  const macToId = {};
  devList.forEach(d => { if (d.macAddress) macToId[d.macAddress.toLowerCase()] = d.id; });

  const mapped = devList.map(d => {
    const mac = d.macAddress?.toLowerCase();
    const s   = statsByMac[mac] || {};

    const uplinkMac = s.uplink?.uplink_mac?.toLowerCase();
    const uplinkId  = uplinkMac ? macToId[uplinkMac] : null;

    const portTable  = s.port_table || [];
    const portsUsed  = portTable.filter(p => p.up).length;

    const sysStats = s['system-stats'] || {};
    const cpu = parseFloat(sysStats.cpu ?? 0);
    const mem = parseFloat(sysStats.mem ?? 0);

    const uptimeSec = parseInt(sysStats.uptime ?? 0);
    const uptimeStr = uptimeSec > 86400
      ? `${Math.floor(uptimeSec / 86400)}d ${Math.floor((uptimeSec % 86400) / 3600)}h`
      : `${Math.floor(uptimeSec / 3600)}h ${Math.floor((uptimeSec % 3600) / 60)}m`;

    let type = 'switch';
    if (d.model === 'UDR7')                                                           type = 'router';
    else if (d.model === 'Express')                                                    type = 'ap';
    else if (d.features?.includes('accessPoint') && !d.features?.includes('switching')) type = 'ap';
    else if (d.features?.includes('switching'))                                        type = 'switch';

    return {
      id:          d.id,
      mac:         d.macAddress?.toLowerCase() || '',
      statMac:     (s.mac || '').toLowerCase(),   // stat API mac (used by SSE)
      statIp:      s.ip || '',                    // stat API IP (used by SSE)
      name:        d.name || d.model,
      type,
      model:       d.model,
      ip:          d.ipAddress || s.ip || '—',
      uplink:      uplinkId,
      uplinkPort:  s.uplink?.uplink_remote_port || null,
      uplinkDepth: s.uplink_depth ?? 0,
      cpu,
      mem,
      uptime:      uptimeStr,
      clients:     s.num_sta ?? 0,
      ports:       portTable.length || 4,
      portsUsed,
      tx:          s.uplink ? `${((s.uplink['tx_bytes-r'] || 0) / 1024).toFixed(1)} KB/s` : '—',
      rx:          s.uplink ? `${((s.uplink['rx_bytes-r'] || 0) / 1024).toFixed(1)} KB/s` : '—',
      stp:         s.stp_priority === 32768,
      x: 0, y: 0  // will be set below
    };
  });

  // Layout only devices that don't have a cached position yet
  const newDevices = mapped.filter(d => !positionCache[d.id]);
  if (newDevices.length > 0) layoutDevices(mapped);

  // Restore cached positions for all devices
  mapped.forEach(d => {
    if (positionCache[d.id]) {
      d.x = positionCache[d.id].x;
      d.y = positionCache[d.id].y;
    }
  });

  devices = mapped;
  render();
  drawMinimap();
}

// ─── THEME TOGGLE ────────────────────────────────────────────────────────────
function isEffectivelyLight() {
  const root = document.documentElement;
  if (root.classList.contains('light')) return true;
  if (root.classList.contains('dark'))  return false;
  return window.matchMedia('(prefers-color-scheme: light)').matches;
}

function applyThemeButton() {
  document.getElementById('themeToggle').textContent = isEffectivelyLight() ? '☾' : '☀';
}

function toggleTheme() {
  const root = document.documentElement;
  const osLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const currentlyLight = isEffectivelyLight();
  // Toggle to opposite of current state, but only set a class if it differs from OS
  root.classList.remove('light', 'dark');
  if (currentlyLight) {
    // Switch to dark — if OS is dark we need no class, if OS is light we need .dark
    if (!osLight) { /* OS is already dark, just remove classes */ }
    else root.classList.add('dark');
    localStorage.setItem('unifi-theme', 'dark');
  } else {
    // Switch to light — if OS is light we need no class, if OS is dark we need .light
    if (osLight) { /* OS is already light, just remove classes */ }
    else root.classList.add('light');
    localStorage.setItem('unifi-theme', 'light');
  }
  applyThemeButton();
  drawMinimap();
}

// Restore saved theme preference on load, then listen for OS changes
(function () {
  const saved = localStorage.getItem('unifi-theme');
  const root  = document.documentElement;
  if (saved === 'light') root.classList.add('light');
  else if (saved === 'dark') root.classList.add('dark');
  applyThemeButton();
  // Live-update if user changes OS theme and has no manual override
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
    if (!localStorage.getItem('unifi-theme')) {
      applyThemeButton();
      drawMinimap();
    }
  });
})();

// ─── SIDEBAR TOGGLE (mobile) ─────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  const open = sb.classList.toggle('open');
  bd.classList.toggle('show', open);
}

// Close sidebar when a device row is tapped on mobile
document.getElementById('sidebar').addEventListener('click', () => {

});

// ─── TOUCH SUPPORT ───────────────────────────────────────────────────────────
let lastTouchDist = null;
const canvasWrapEl = document.getElementById('canvasWrap');

canvasWrapEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else if (e.touches.length === 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX;
    panStartY = e.touches[0].clientY;
    panOriginX = panX;
    panOriginY = panY;
  }
}, { passive: true });

canvasWrapEl.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastTouchDist) zoom(dist / lastTouchDist);
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && isPanning) {
    panX = panOriginX + (e.touches[0].clientX - panStartX);
    panY = panOriginY + (e.touches[0].clientY - panStartY);
    applyTransform();
    drawMinimap();
  }
}, { passive: true });

canvasWrapEl.addEventListener('touchend', () => {
  lastTouchDist = null;
  isPanning = false;
}, { passive: true });

// ─── REALTIME — Server-Sent Events ───────────────────────────────────────────
let sse = null;
let sseRetryTimer = null;
let topoDebounce = null;

// Topology refresh: triggered by SSE events (device up/down, client join etc.)
// Debounced so a burst of events causes only one re-fetch.
function scheduleTopoRefresh() {
  clearTimeout(topoDebounce);
  topoDebounce = setTimeout(() => fetchFromAPI(), 600);
}

function connectSSE() {
  if (sse) { sse.close(); sse = null; }
  clearTimeout(sseRetryTimer);

  const sseUrl = `${BASE}/unifi-sse`;
  console.log('SSE connecting:', sseUrl);
  sse = new EventSource(sseUrl);

  sse.onopen = () => console.log('SSE open');

  sse.onmessage = (evt) => {
    if (!evt.data) return;
    try {
      const msg = JSON.parse(evt.data);
      const msgType = msg?.meta?.message || '';

      if (msgType === 'stat-update') {
        // Server-pushed live stats — apply directly, no fetch needed
        applyStatUpdate(msg.data || []);
        return;
      }
    } catch(_) {}
    // Any other event = topology change, do a full refresh
    scheduleTopoRefresh();
  };

  sse.onerror = () => {
    console.warn('SSE error — reconnecting in 5s');
    sse.close();
    sse = null;
    sseRetryTimer = setTimeout(connectSSE, 5000);
  };
}

// ─── STAT POLLING ─────────────────────────────────────────────────────────────
// Fetches only the heavy stat endpoint every 10 seconds and patches
// node values in-place — no full re-render, no canvas disruption.
// ─── LIVE STAT UPDATE (from SSE push) ────────────────────────────────────────
function applyStatUpdate(statList) {
  if (!devices.length) return;

  const byMac = {};
  const byIp  = {};
  statList.forEach(s => {
    if (s.mac) byMac[s.mac.toLowerCase().replace(/[^0-9a-f]/g, '')] = s;
    if (s.ip)  byIp[s.ip] = s;
  });

  devices.forEach(d => {
    // Match priority: stat MAC (same source as SSE) > stat IP > integration IP
    const normStatMac  = d.statMac ? d.statMac.replace(/[^0-9a-f]/g, '') : '';
    const normIntegMac = d.mac     ? d.mac.replace(/[^0-9a-f]/g, '')     : '';
    const s = (normStatMac  && byMac[normStatMac])
           || (normIntegMac && byMac[normIntegMac])
           || byIp[d.statIp]
           || byIp[d.ip];
    if (!s) return;

    const cpu      = parseFloat(s.cpu ?? d.cpu);
    const mem      = parseFloat(s.mem ?? d.mem);
    const clients  = s.clients  ?? d.clients;
    const portsUsed = s.portsUsed ?? d.portsUsed;
    const tx = s.tx != null ? `${s.tx} KB/s` : d.tx;
    const rx = s.rx != null ? `${s.rx} KB/s` : d.rx;

    d.cpu = cpu; d.mem = mem; d.clients = clients;
    d.portsUsed = portsUsed; d.tx = tx; d.rx = rx;

    const el = document.querySelector(`.node[data-id="${d.id}"]`);
    if (el) {
      const cpuColor = cpu > 80 ? 'warn' : 'good';
      const memColor = mem > 85 ? 'warn' : 'good';
      el.querySelectorAll('.ns').forEach(ns => {
        const label = ns.querySelector('.ns-label')?.textContent?.trim().toUpperCase();
        const val   = ns.querySelector('.ns-val');
        if (!val) return;
        if (label === 'CPU')     { val.textContent = cpu.toFixed(1) + '%'; val.className = `ns-val ${cpuColor}`; }
        if (label === 'MEM')     { val.textContent = mem.toFixed(1) + '%'; val.className = `ns-val ${memColor}`; }
        if (label === 'CLIENTS')   val.textContent = clients;
      });
    }

    const row = document.querySelector(`.device-row[data-id="${d.id}"]`);
    if (row) {
      row.querySelectorAll('.stat').forEach(st => {
        if (st.textContent.startsWith('CPU')) st.innerHTML = `CPU <span>${cpu.toFixed(1)}%</span>`;
        if (st.textContent.startsWith('MEM')) st.innerHTML = `MEM <span>${mem.toFixed(1)}%</span>`;
      });
    }
  });
}

// siteId is cached after first fetch — no need to re-fetch sites every 10s
let _cachedSiteId = null;

let _pollInFlight = false;
async function pollStats() {
  if (!devices.length || _pollInFlight) return;
  _pollInFlight = true;
  const abort = new AbortController();
  const abortTimer = setTimeout(() => {
    console.warn('[pollStats] fetch timed out after 8s — aborting');
    abort.abort();
  }, 8000);
  try {
    // Fetch only the stats endpoint — site ID is stable and cached
    const statsRes = await fetch(`${BASE}/unifi/proxy/network/api/s/default/stat/device`, {
      headers: { Accept: 'application/json' },
      signal: abort.signal
    });
    clearTimeout(abortTimer);
    if (!statsRes.ok) return;
    const statsList = (await statsRes.json()).data || [];

    // Build lookup by MAC address (the stable device identifier)
    const statsByMac = {};
    const statsByIp  = {};
    statsList.forEach(s => {
      if (s.mac) statsByMac[s.mac.toLowerCase().replace(/[^0-9a-f]/g, '')] = s;
      if (s.ip)  statsByIp[s.ip] = s;
    });

    // Debug: log once so we can verify MAC/IP matching
    if (!pollStats._debugged && devices.length && statsList.length) {
      pollStats._debugged = true;
      const d0 = devices[0];
      const s0 = statsList[0];
      console.log('[pollStats debug] device[0]:', {id: d0.id, mac: d0.mac, ip: d0.ip});
      console.log('[pollStats debug] stat[0]:', {mac: s0.mac, ip: s0.ip, name: s0.name});
      console.log('[pollStats debug] statsByMac keys:', Object.keys(statsByMac).slice(0,5));
      console.log('[pollStats debug] statsByIp keys:', Object.keys(statsByIp).slice(0,5));
    }

    devices.forEach(d => {
      const normStatMac  = d.statMac ? d.statMac.replace(/[^0-9a-f]/g, '') : '';
      const normIntegMac = d.mac     ? d.mac.replace(/[^0-9a-f]/g, '')     : '';
      const s = (normStatMac  && statsByMac[normStatMac])
             || (normIntegMac && statsByMac[normIntegMac])
             || statsByIp[d.statIp]
             || statsByIp[d.ip]
             || {};

      const sysStats  = s['system-stats'] || {};
      const cpu       = parseFloat(sysStats.cpu ?? d.cpu);
      const mem       = parseFloat(sysStats.mem ?? d.mem);
      const clients   = s.num_sta   ?? d.clients;
      const portsUsed = (s.port_table || []).filter(p => p.up).length || d.portsUsed;
      const tx = s.uplink ? `${((s.uplink['tx_bytes-r'] || 0) / 1024).toFixed(1)} KB/s` : d.tx;
      const rx = s.uplink ? `${((s.uplink['rx_bytes-r'] || 0) / 1024).toFixed(1)} KB/s` : d.rx;

      // Skip DOM update if nothing changed
      if (cpu === d.cpu && mem === d.mem && clients === d.clients) return;

      d.cpu = cpu; d.mem = mem; d.clients = clients;
      d.portsUsed = portsUsed; d.tx = tx; d.rx = rx;

      const el = document.querySelector(`.node[data-id="${d.id}"]`);
      if (!el) return;

      const cpuColor = cpu > 80 ? 'warn' : 'good';
      const memColor = mem > 85 ? 'warn' : 'good';

      el.querySelectorAll('.ns').forEach(ns => {
        const label = ns.querySelector('.ns-label')?.textContent?.trim().toUpperCase();
        const val   = ns.querySelector('.ns-val');
        if (!val) return;
        if (label === 'CPU')      { val.textContent = cpu.toFixed(1) + '%';  val.className = `ns-val ${cpuColor}`; }
        if (label === 'MEM')      { val.textContent = mem.toFixed(1) + '%';  val.className = `ns-val ${memColor}`; }
        if (label === 'CLIENTS')    val.textContent = clients;
      });

      const row = document.querySelector(`.device-row[data-id="${d.id}"]`);
      if (row) {
        row.querySelectorAll('.stat').forEach(st => {
          if (st.textContent.startsWith('CPU')) st.innerHTML = `CPU <span>${cpu.toFixed(1)}%</span>`;
          if (st.textContent.startsWith('MEM')) st.innerHTML = `MEM <span>${mem.toFixed(1)}%</span>`;
        });
      }
    });
  } catch (e) {
    clearTimeout(abortTimer);
    if (e.name === 'AbortError') {
      console.warn('[pollStats] request aborted (timeout)');
    } else {
      console.error('[pollStats] ERROR:', e, e.stack);
    }
  } finally {
    _pollInFlight = false;
  }
}
